name: Update README stats

on:
  schedule:
    - cron: '0 6 * * 1'   # todos los lunes a las 06:00 UTC
  workflow_dispatch:        # lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerar SVG de estadísticas
        env:
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: node scripts/generate-stats.mjs

      - name: Commitear si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/projects/resumen.svg images/projects/toplangs.svg
          git diff --cached --quiet || git commit -m "chore: actualizar estadísticas del README"
          git push
